name: Build and Release Installer

# Build installer on Windows after Semantic Release, upload to matching tag.
# release:published does not fire for GITHUB_TOKEN releases — chain via workflow_run.

on:
  workflow_run:
    workflows: ["Semantic Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version X.Y.Z (without v prefix); release tag must already exist"
        required: true

permissions:
  contents: write

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      skip: ${{ steps.meta.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || 'main' }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version and tag
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            git fetch --tags --force origin main
            TAG=$(git describe --exact-match --tags HEAD 2>/dev/null || true)
            if [ -z "$TAG" ] || ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "HEAD has no semver release tag; skipping installer build"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          VERSION="${TAG#v}"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "installer=prod/installers/TimeTracker_Setup_${VERSION}.exe" >> "$GITHUB_OUTPUT"

      - name: Verify version matches pyproject.toml
        if: steps.meta.outputs.skip != 'true'
        shell: bash
        run: |
          expected="${{ steps.meta.outputs.version }}"
          actual=$(python -c "import re; t=open('pyproject.toml',encoding='utf-8').read(); print(re.search(r'^version = \"([^\"]+)\"', t, re.M).group(1))")
          if [ "$expected" != "$actual" ]; then
            echo "pyproject.toml ($actual) does not match tag ($expected)" >&2
            exit 1
          fi

      - name: Install Python dependencies
        if: steps.meta.outputs.skip != 'true'
        run: pip install -e ".[dev]"

      - name: Run tests
        if: steps.meta.outputs.skip != 'true'
        run: python -m pytest tests/ -q

      - name: Install Inno Setup
        if: steps.meta.outputs.skip != 'true'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          Add-Content -Path $env:GITHUB_ENV -Value "INNO_SETUP_PATH=C:\Program Files (x86)\Inno Setup 6\ISCC.exe"

      - name: Build installer
        if: steps.meta.outputs.skip != 'true'
        run: python prod/gen_exe.py

      - uses: actions/upload-artifact@v4
        if: steps.meta.outputs.skip != 'true'
        with:
          name: release-installer
          path: ${{ steps.meta.outputs.installer }}

      - name: Upload installer to GitHub Release
        if: steps.meta.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "${{ steps.meta.outputs.installer }}" \
            --clobber
